name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-and-tests:
    name: Quality & Custom Tests
    runs-on: ubuntu-latest

    env:
      SIMPLETEST_BASE_URL: http://127.0.0.1:8888
      SIMPLETEST_DB: sqlite://localhost/tmp/simpletest.sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          extensions: sqlite3

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (with require-dev)
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run quality scripts defined in composer.json
        run: |
          scripts="$(composer run-script --list)"

          if echo "$scripts" | grep -qE '^\s*lint:phpcs\b'; then
            composer lint:phpcs
          fi

          if echo "$scripts" | grep -qE '^\s*lint:phpstan\b'; then
            composer lint:phpstan
          fi

          if echo "$scripts" | grep -qE '^\s*lint:drupal-check\b'; then
            composer lint:drupal-check
          fi

      - name: Start local web server for BrowserTestBase
        run: php -S 127.0.0.1:8888 -t web >/tmp/php-server.log 2>&1 &

      - name: Prepare BrowserTestBase HTML output directory
        run: |
          mkdir -p web/sites/simpletest/browser_output
          mkdir -p sites/simpletest/browser_output
          chmod -R 777 web/sites/simpletest
          chmod -R 777 sites/simpletest

      - name: Run custom PHPUnit suite only (exclude unstable_ia and unstable_language_switcher)
        run: vendor/bin/phpunit -c web/core/phpunit.xml.dist --exclude-group unstable_ia,unstable_language_switcher web/modules/custom/agency_project_tests/tests

      - name: Upload BrowserTestBase HTML output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-output
          path: |
            web/sites/simpletest/browser_output
            sites/simpletest/browser_output
