title: Contact
description: 'Basic email contact webform.'
elements: |
  name:
    '#type': textfield
    '#title': 'Your name'
    '#required': true
    '#default_value': '[current-user:display-name]'
  email:
    '#type': email
    '#title': 'Your email'
    '#required': true
    '#default_value': '[current-user:mail]'
  organization:
    '#type': textfield
    '#title': 'Organization'
    '#placeholder': 'Name of your organization'
  organization_type:
    '#type': select
    '#title': 'Organization type'
    '#options':
      sme: 'SME / company'
      nonprofit: 'Non-profit'
      public: 'Public institution'
      agency: 'Agency / partner'
      other: 'Other'
    '#empty_option': 'Not specified'
  project_type:
    '#type': select
    '#title': 'Project type'
    '#options':
      new_site: 'New Drupal website'
      redesign: 'Redesign or modernization'
      migration: 'Drupal migration'
      audit: 'Drupal audit'
      maintenance: 'Maintenance or support'
      ai: 'AI & Drupal'
      other: 'Other need'
    '#empty_option': 'Not specified'
  main_need:
    '#type': select
    '#title': 'Main need'
    '#options':
      frame: 'Frame the project'
      estimate: 'Get an estimate'
      improve: 'Improve an existing site'
      secure: 'Secure or maintain'
      discuss: 'Discuss an idea'
    '#empty_option': 'Not specified'
  budget:
    '#type': select
    '#title': 'Indicative budget'
    '#options':
      unknown: 'To be defined'
      under_5k: 'Less than €5,000'
      5k_15k: '€5,000 to €15,000'
      15k_30k: '€15,000 to €30,000'
      over_30k: 'More than €30,000'
    '#empty_option': 'Not specified'
  timeline:
    '#type': select
    '#title': 'Expected timeline'
    '#options':
      urgent: 'As soon as possible'
      one_three_months: '1 to 3 months'
      three_six_months: '3 to 6 months'
      later: 'Later / to be planned'
    '#empty_option': 'Not specified'
  subject:
    '#type': textfield
    '#title': Subject
    '#required': true
    '#test': 'Testing contact webform from [site:name]'
  message:
    '#type': textarea
    '#title': Message
    '#required': true
    '#rows': 5
    '#placeholder': 'Briefly describe your context, goal, and useful constraints.'
    '#test': 'Please ignore this email.'
  rgpd_consent:
    '#type': checkbox
    '#title': 'I agree that my data will be used to process my request, in accordance with the'
    '#description': '<a href="/en/privacy-policy">privacy policy</a>.'
    '#required': true
    '#default_value': 0
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Send message'
settings:
  confirmation_message: 'Your message has been sent.'
  confirmation_url: '<front>'
handlers:
  email_confirmation:
    label: 'Email confirmation'
    settings:
      from_name: _default
      subject: '[webform_submission:values:subject:raw]'
      body: "Thank you for your message. We will get back to you soon.\r\n\r\n[webform_submission:values]"
  email_notification:
    label: 'Email notification'
    settings:
      from_name: '[webform_submission:values:name:raw]'
      subject: '[webform_submission:values:subject:raw]'
      body: '[webform_submission:values]'
