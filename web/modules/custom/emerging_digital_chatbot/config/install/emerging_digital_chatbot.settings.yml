enabled: true
mode: guide
languages:
  - fr
  - en
allowed_pages:
  - '*'
excluded_pages:
  - /fr/contact
  - /en/contact
  - /contact
future_ai:
  enabled: false
  provider: openai
  endpoint: 'https://api.openai.com/v1/responses'
  model: 'gpt-4o-mini'
  openai_key_id: 'openai_api_key'
  temperature: 0.2
  max_output_tokens: 220
  timeout_seconds: 8
  prompt_version: mvp_contact_v1
  rag_profile: public_pages_v1
  analytics_enabled: false
  retention_policy: none
  fallback_message:
    fr: 'Je peux vous aider à clarifier votre besoin et vous orienter vers la bonne page. Pour une proposition engageante, l’équipe doit reprendre contact avec vous.'
    en: 'I can help you clarify your need and point you to the right page. For a binding proposal, the team needs to follow up with you.'
  security:
    max_input_chars: 600
    max_context_chars: 1200
    rate_limit:
      limit: 10
      window_seconds: 60
  context:
    max_context_chars: 1200
    allowed_public_paths:
      fr:
        - /fr/accueil
        - /fr/services
        - /fr/ia-drupal
        - /fr/agence-drupal-belgique
        - /fr/creation-site-drupal
        - /fr/maintenance-drupal
        - /fr/migration-drupal
        - /fr/refonte-site-drupal
        - /fr/audit-drupal
        - /fr/accessibilite-seo-optimisation
        - /fr/contact
      en:
        - /en/home
        - /en/services
        - /en/ai-drupal
        - /en/drupal-agency-belgium
        - /en/drupal-website-creation
        - /en/drupal-maintenance
        - /en/drupal-migration
        - /en/drupal-website-redesign
        - /en/drupal-audit
        - /en/ai-accessibility-seo-optimization
        - /en/contact
  prompts:
    fr:
      system: |
        Vous êtes l’assistance automatisée encadrée d’E-merging Digital. Votre rôle est d’aider un visiteur à clarifier un besoin Drupal, IA Drupal, accessibilité ou SEO, puis à l’orienter vers une page publique utile ou vers le contact humain.

        Règles strictes :
        - répondez en français, avec un ton sobre, professionnel, rassurant et concis ;
        - ne donnez jamais de prix, devis, fourchette budgétaire, délai garanti ou validation commerciale ;
        - ne promettez jamais qu’un projet est accepté ou techniquement validé ;
        - ne donnez pas d’avis juridique, médical, financier ou contractuel ;
        - ne demandez pas de données sensibles, mots de passe, secrets, documents privés ou données de tiers ;
        - ne prétendez pas disposer d’informations hors contexte public fourni par Drupal ;
        - indiquez que l’équipe doit reprendre contact pour toute proposition engageante.

        Réponse de garde-fou à utiliser si la demande dépasse ces limites : "Je peux vous aider à clarifier votre besoin et vous orienter vers la bonne page. Pour une proposition engageante, l’équipe doit reprendre contact avec vous."
    en:
      system: |
        You are E-merging Digital’s controlled automated assistant. Your role is to help a visitor clarify a Drupal, Drupal AI, accessibility, or SEO need, then point them to a useful public page or human contact.

        Strict rules:
        - answer in English with a calm, professional, reassuring, and concise tone;
        - never provide prices, quotes, budget ranges, guaranteed timelines, or commercial validation;
        - never promise that a project is accepted or technically validated;
        - do not provide legal, medical, financial, or contractual advice;
        - do not ask for sensitive data, passwords, secrets, private documents, or third-party data;
        - do not claim access to information beyond the public context supplied by Drupal;
        - state that the team must follow up for any binding proposal.

        Guardrail response to use when the request goes beyond these limits: "I can help you clarify your need and point you to the right page. For a binding proposal, the team needs to follow up with you."
messages:
  fr:
    title: 'Assistant E-merging Digital'
    launcher_label: 'Ouvrir l’assistant'
    close_label: 'Fermer'
    reset_label: 'Recommencer'
    intro: 'Bonjour, je peux vous aider à qualifier votre projet, choisir le bon parcours et préparer un contact utile.'
    transparency: 'Ce MVP fonctionne sans IA générative libre. Les choix restent guidés, aucune conversation n’est stockée durablement et il ne faut pas envoyer de données sensibles.'
    guardrail: 'Pour un budget, un délai ou une proposition engageante, l’équipe reprend contact avec vous.'
    choose_label: 'Choisir un parcours'
    cta_label: 'Actions proposées'
    privacy_label: 'Confidentialité'
    privacy_path: '/fr/politique-de-confidentialite'
    flows:
      qualify_project:
        label: 'Qualifier mon projet'
        response: 'Pour préparer un échange utile, rassemblez le contexte, le type de besoin, l’état du site existant, l’horizon souhaité, le niveau de maturité et les contraintes importantes. Gardez les informations sensibles hors du formulaire.'
        ctas:
          - label: 'Qualifier mon projet'
            path: '/fr/contact'
          - label: 'Voir les services'
            path: '/fr/services'
          - label: 'Voir des cas similaires'
            path: '/fr/cas-clients'
          - label: 'Explorer IA & Drupal'
            path: '/fr/ia-drupal'
      drupal_project:
        label: 'J’ai un projet Drupal'
        response: 'Nous pouvons vous orienter selon votre besoin : création, architecture, maintenance ou accompagnement Drupal.'
        ctas:
          - label: 'Voir les services Drupal'
            path: '/fr/services'
          - label: 'Agence Drupal Belgique'
            path: '/fr/agence-drupal-belgique'
          - label: 'Création de site Drupal'
            path: '/fr/creation-site-drupal'
          - label: 'Parler à un humain'
            path: '/fr/contact'
      modernize:
        label: 'Je veux moderniser un site existant'
        response: 'Pour une refonte ou une migration, le plus utile est de clarifier le contexte actuel, les objectifs et les contraintes.'
        ctas:
          - label: 'Refonte Drupal'
            path: '/fr/refonte-site-drupal'
          - label: 'Migration Drupal'
            path: '/fr/migration-drupal'
          - label: 'Maintenance Drupal'
            path: '/fr/maintenance-drupal'
          - label: 'Nous contacter'
            path: '/fr/contact'
      ai_drupal:
        label: 'Je cherche de l’aide sur IA & Drupal'
        response: 'L’approche recommandée est progressive : cadrer les cas d’usage, sécuriser les données, puis intégrer l’IA côté Drupal.'
        ctas:
          - label: 'Découvrir IA & Drupal'
            path: '/fr/ia-drupal'
          - label: 'IA intégrée'
            path: '/fr/ia-integree'
          - label: 'Gouvernance IA'
            path: '/fr/ia-drupal/gouvernance-validation'
          - label: 'Échanger avec l’équipe'
            path: '/fr/contact'
      seo_accessibility:
        label: 'Je veux améliorer SEO / accessibilité'
        response: 'Un audit permet de prioriser les corrections utiles : technique, contenu, accessibilité, performance et maillage interne.'
        ctas:
          - label: 'SEO et accessibilité'
            path: '/fr/accessibilite-seo-optimisation'
          - label: 'Audit Drupal'
            path: '/fr/audit-drupal'
          - label: 'Services'
            path: '/fr/services'
          - label: 'Demander un avis humain'
            path: '/fr/contact'
      contact:
        label: 'Je souhaite vous contacter'
        response: 'Le formulaire de contact reste le meilleur canal. Vous pouvez y décrire votre contexte en quelques lignes, sans partager d’informations sensibles.'
        ctas:
          - label: 'Aller au contact'
            path: '/fr/contact'
          - label: 'Voir les services'
            path: '/fr/services'
          - label: 'Politique de confidentialité'
            path: '/fr/politique-de-confidentialite'
  en:
    title: 'E-merging Digital assistant'
    launcher_label: 'Open assistant'
    close_label: 'Close'
    reset_label: 'Start again'
    intro: 'Hello, I can help you qualify your project, choose the right path and prepare a useful contact request.'
    transparency: 'This MVP runs without free-form generative AI. Choices stay guided, no conversation is stored long term and sensitive data should not be sent.'
    guardrail: 'For a budget, timeline, or binding proposal, the team will follow up with you.'
    choose_label: 'Choose a path'
    cta_label: 'Suggested actions'
    privacy_label: 'Privacy'
    privacy_path: '/en/privacy-policy'
    flows:
      qualify_project:
        label: 'Qualify my project'
        response: 'To prepare a useful conversation, gather the context, need type, existing website status, desired timeline, maturity level and important constraints. Keep sensitive information out of the form.'
        ctas:
          - label: 'Qualify my project'
            path: '/en/contact'
          - label: 'View services'
            path: '/en/services'
          - label: 'See similar cases'
            path: '/en/case-studies'
          - label: 'Explore AI & Drupal'
            path: '/en/ai-drupal'
      drupal_project:
        label: 'I have a Drupal project'
        response: 'We can route you by need: creation, architecture, maintenance, or Drupal support.'
        ctas:
          - label: 'View Drupal services'
            path: '/en/services'
          - label: 'Drupal agency Belgium'
            path: '/en/drupal-agency-belgium'
          - label: 'Drupal website creation'
            path: '/en/drupal-website-creation'
          - label: 'Talk to a human'
            path: '/en/contact'
      modernize:
        label: 'I want to modernize an existing site'
        response: 'For a redesign or migration, the useful first step is clarifying the current context, goals, and constraints.'
        ctas:
          - label: 'Drupal redesign'
            path: '/en/drupal-website-redesign'
          - label: 'Drupal migration'
            path: '/en/drupal-migration'
          - label: 'Drupal maintenance'
            path: '/en/drupal-maintenance'
          - label: 'Contact us'
            path: '/en/contact'
      ai_drupal:
        label: 'I need help with AI & Drupal'
        response: 'The recommended approach is progressive: frame the use cases, secure the data, then integrate AI on the Drupal side.'
        ctas:
          - label: 'Explore AI & Drupal'
            path: '/en/ai-drupal'
          - label: 'Integrated AI'
            path: '/en/integrated-ai'
          - label: 'AI governance'
            path: '/en/ai-drupal/governance-approval'
          - label: 'Talk to the team'
            path: '/en/contact'
      seo_accessibility:
        label: 'I want to improve SEO / accessibility'
        response: 'An audit helps prioritize useful fixes: technical SEO, content, accessibility, performance, and internal links.'
        ctas:
          - label: 'SEO and accessibility'
            path: '/en/ai-accessibility-seo-optimization'
          - label: 'Drupal audit'
            path: '/en/drupal-audit'
          - label: 'Services'
            path: '/en/services'
          - label: 'Ask for human input'
            path: '/en/contact'
      contact:
        label: 'I would like to contact you'
        response: 'The contact form is the best channel. You can describe your context in a few lines without sharing sensitive information.'
        ctas:
          - label: 'Go to contact'
            path: '/en/contact'
          - label: 'View services'
            path: '/en/services'
          - label: 'Privacy policy'
            path: '/en/privacy-policy'
