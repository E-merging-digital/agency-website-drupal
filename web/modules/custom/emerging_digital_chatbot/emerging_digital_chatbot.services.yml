services:
  emerging_digital_chatbot.config:
    class: Drupal\emerging_digital_chatbot\ChatbotConfig
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@path.current'
      - '@path_alias.manager'
      - '@path.matcher'

  emerging_digital_chatbot.qualification_engine:
    class: Drupal\emerging_digital_chatbot\QualificationEngine
    arguments:
      - '@emerging_digital_chatbot.config'

  emerging_digital_chatbot.payload_sanitizer:
    class: Drupal\emerging_digital_chatbot\FutureAi\ChatbotPayloadSanitizer
    arguments:
      - '@emerging_digital_chatbot.config'

  emerging_digital_chatbot.public_ai_context_provider:
    class: Drupal\emerging_digital_chatbot\FutureAi\PublicAiContextProvider
    arguments:
      - '@config.factory'
      - '@emerging_digital_chatbot.public_context_builder'

  emerging_digital_chatbot.public_context_builder:
    class: Drupal\emerging_digital_chatbot\Context\PublicContextBuilder
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@path_alias.manager'
      - '@entity_type.manager'

  emerging_digital_chatbot.future_ai_environment_guard:
    class: Drupal\emerging_digital_chatbot\FutureAi\FutureAiEnvironmentGuard
    arguments:
      - '@emerging_digital_chatbot.config'
      - '@config.factory'
      - '@?key.repository'
      - '@emerging_digital_chatbot.future_ai_provider_registry'

  emerging_digital_chatbot.future_ai_monitoring:
    class: Drupal\emerging_digital_chatbot\FutureAi\FutureAiMonitoring
    arguments:
      - '@cache.default'
      - '@datetime.time'
      - '@logger.channel.emerging_digital_chatbot'

  emerging_digital_chatbot.fallback_ai_gateway:
    class: Drupal\emerging_digital_chatbot\FutureAi\NullFutureAiGateway
    arguments:
      - '@emerging_digital_chatbot.config'

  emerging_digital_chatbot.null_future_ai_provider_gateway:
    class: Drupal\emerging_digital_chatbot\FutureAi\NullFutureAiProviderGateway
    tags:
      - { name: emerging_digital_chatbot.future_ai_provider }

  emerging_digital_chatbot.mock_future_ai_provider_gateway:
    class: Drupal\emerging_digital_chatbot\FutureAi\MockFutureAiProviderGateway
    tags:
      - { name: emerging_digital_chatbot.future_ai_provider }

  emerging_digital_chatbot.openai_responses_gateway:
    class: Drupal\emerging_digital_chatbot\FutureAi\OpenAiResponsesGateway
    arguments:
      - '@emerging_digital_chatbot.config'
      - '@http_client'
      - '@logger.channel.emerging_digital_chatbot'
    tags:
      - { name: emerging_digital_chatbot.future_ai_provider }

  emerging_digital_chatbot.future_ai_provider_registry:
    class: Drupal\emerging_digital_chatbot\FutureAi\FutureAiProviderRegistry
    arguments:
      - '@config.factory'
      - !tagged_iterator emerging_digital_chatbot.future_ai_provider

  emerging_digital_chatbot.future_ai_orchestrator:
    class: Drupal\emerging_digital_chatbot\FutureAi\FutureAiOrchestrator
    arguments:
      - '@emerging_digital_chatbot.config'
      - '@emerging_digital_chatbot.future_ai_environment_guard'
      - '@emerging_digital_chatbot.public_ai_context_provider'
      - '@emerging_digital_chatbot.future_ai_provider_registry'
      - '@emerging_digital_chatbot.fallback_ai_gateway'
      - '@emerging_digital_chatbot.future_ai_monitoring'
      - '@logger.channel.emerging_digital_chatbot'

  emerging_digital_chatbot.future_ai_gateway:
    alias: emerging_digital_chatbot.future_ai_orchestrator

  logger.channel.emerging_digital_chatbot:
    parent: logger.channel_base
    arguments: ['emerging_digital_chatbot']
