translations:
  fr:
    fields:
      field_short_description:
        value: >-
          Agence Drupal en Belgique pour PME, ASBL et institutions : audit,
          création, refonte, migration et maintenance de sites Drupal
          accessibles, performants et durables.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital accompagne les organisations belges qui veulent un
          site Drupal fiable, clair pour les équipes éditoriales et prêt pour
          les enjeux de performance, d'accessibilité et de référencement
          naturel.</p><h2>Ce que nous prenons en charge</h2><ul><li>Audit
          Drupal, architecture de contenu et priorisation technique.</li><li>
          Création ou refonte de sites Drupal pour PME, ASBL et institutions.
          </li><li>Migration, maintenance, sécurité et amélioration continue.
          </li><li>Optimisation SEO technique, performance et accessibilité.
          </li><li>Intégration d'usages IA utiles dans les workflows éditoriaux
          Drupal.</li></ul><p>Nos pages détaillent aussi la <a
          href="/fr/creation-site-drupal">création de site Drupal</a>, la <a
          href="/fr/refonte-site-drupal">refonte Drupal</a>, la <a
          href="/fr/migration-drupal">migration Drupal</a>, la <a
          href="/fr/maintenance-drupal">maintenance Drupal</a>, l'<a
          href="/fr/audit-drupal">audit Drupal</a>, l'<a
          href="/fr/accessibilite-seo-optimisation">optimisation accessibilité
          et SEO</a> et l'<a href="/fr/ia-integree">IA intégrée dans
          Drupal</a>.</p><p>La page est synchronisée avec un identifiant
          métier stable afin de pouvoir être rejouée sans duplication. Vous
          pouvez aussi consulter nos <a href="/fr/services">services
          Drupal</a> et notre approche <a href="/fr/ia-drupal">IA &amp;
          Drupal</a>.</p>
        format: basic_html
  en:
    fields:
      field_short_description:
        value: >-
          Drupal agency in Belgium for SMEs, non-profits and institutions:
          audits, builds, redesigns, migrations and maintenance for accessible,
          performant websites.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital supports Belgian organisations that need a
          reliable Drupal website, clear editorial workflows and a strong
          foundation for performance, accessibility and organic search.</p><h2>
          What we cover</h2><ul><li>Drupal audits, content architecture and
          technical prioritisation.</li><li>Drupal website builds and redesigns
          for SMEs, non-profits and institutions.</li><li>Migration,
          maintenance, security and continuous improvement.</li><li>Technical
          SEO, performance and accessibility optimisation.</li><li>Practical AI
          use cases inside Drupal editorial workflows.</li></ul><p>Our service
          pages also cover <a href="/en/drupal-website-creation">Drupal website
          creation</a>, <a href="/en/drupal-website-redesign">Drupal
          redesign</a>, <a href="/en/drupal-migration">Drupal migration</a>,
          <a href="/en/drupal-maintenance">Drupal maintenance</a>, <a
          href="/en/drupal-audit">Drupal audits</a>, <a
          href="/en/ai-accessibility-seo-optimization">accessibility and SEO
          optimization</a> and <a href="/en/integrated-ai">integrated AI in
          Drupal</a>.</p><p>This page is
          synchronized through a stable business identifier so it can be replayed
          without duplication. You can also explore our <a href="/en/services">
          Drupal services</a> and our <a href="/en/ai-drupal">AI &amp;
          Drupal</a> approach.</p>
        format: basic_html
