translations:
  fr:
    title: 'Correction éditoriale'
    alias: /ia-drupal/correction-editoriale
    fields:
      field_short_description:
        value: >-
          Assistant IA pour relire, clarifier et harmoniser le ton des contenus
          Drupal avant validation éditoriale.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>La correction éditoriale IA sert à améliorer un contenu déjà écrit
          avant sa validation. Elle repère les phrases trop longues, les
          passages ambigus, les incohérences de ton et les formulations qui
          compliquent la lecture pour un public non spécialiste.</p><p>Cas
          d’usage concret : une ASBL publie une page d’information sur un
          dispositif d’aide. Le texte est exact, mais trop administratif.
          L’assistant propose une version plus directe, signale les mots à
          expliquer et conserve les points qui doivent être confirmés par
          l’équipe métier.</p><p><strong>Workflow IA crédible :</strong></p><ol><li>Le
          contributeur soumet le texte Drupal et choisit les objectifs :
          clarté, ton, accessibilité ou cohérence.</li><li>L’assistant renvoie
          des suggestions commentées, sans écraser la version source.</li><li>Le
          responsable éditorial accepte, modifie ou rejette chaque proposition.</li><li>La
          version finale est relue par une personne responsable avant
          publication.</li></ol><p>Pour une PME, cette relecture réduit les
          allers-retours sur des pages de services. Pour une institution, elle
          aide à garder un ton stable entre plusieurs services rédacteurs, tout
          en respectant les exigences d’accessibilité et de précision.</p><p>Les
          bénéfices métier sont une qualité plus régulière, une meilleure
          lisibilité, moins de reprises tardives et des textes plus cohérents
          avec la ligne éditoriale. Les limites sont assumées : l’IA ne connaît
          pas toujours le contexte juridique, politique ou sectoriel. Les faits,
          chiffres, obligations et formulations sensibles restent validés par
          un humain.</p><p><strong><a href="/fr/contact">Auditer un workflow de
          relecture IA</a></strong> ou explorer le hub <a
          href="/fr/ia-drupal">IA &amp; Drupal</a>. Cette fonctionnalité
          complète la <a href="/fr/ia-drupal/redaction-assistee">rédaction
          assistée</a> et les services d’<a
          href="/fr/accessibilite-seo-optimisation">accessibilité, SEO et
          optimisation</a>.</p>
        format: basic_html
      field_customer_benefit:
        value: >-
          Une qualité éditoriale plus régulière, avec moins de reprises tardives
          et une meilleure lisibilité pour les publics cibles.
        format: basic_html
      field_concrete_example:
        value: >-
          Une ASBL relit une page d’aide au public : l’IA simplifie les phrases,
          liste les points à confirmer et l’équipe valide les formulations
          sensibles avant publication.
        format: basic_html
      field_use_cases:
        - value: 'Repérer les phrases longues ou ambiguës.'
          format: basic_html
        - value: 'Harmoniser le ton entre plusieurs pages Drupal.'
          format: basic_html
        - value: 'Préparer une relecture accessibilité et contenu.'
          format: basic_html
  en:
    title: 'Editorial review'
    alias: /ai-drupal/editorial-review
    fields:
      field_short_description:
        value: >-
          AI assistant to review, clarify and harmonise the tone of Drupal
          content before editorial approval.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>AI editorial review improves existing content before approval. It
          identifies long sentences, ambiguous sections, tone inconsistencies
          and wording that makes the page harder to understand for a
          non-specialist audience.</p><p>Concrete use case: a non-profit
          publishes an information page about a support programme. The text is
          accurate, but too administrative. The assistant suggests a clearer
          version, highlights terms that should be explained and preserves the
          points that need subject-matter confirmation.</p><p><strong>Credible
          AI workflow:</strong></p><ol><li>The contributor submits the Drupal
          text and chooses the goals: clarity, tone, accessibility or
          consistency.</li><li>The assistant returns commented suggestions
          without overwriting the source version.</li><li>The editorial owner
          accepts, edits or rejects each proposal.</li><li>The final version is
          reviewed by an accountable person before publication.</li></ol><p>For
          an SME, this review reduces back-and-forth on service pages. For an
          institution, it helps keep a stable tone across several editorial
          departments while respecting accessibility and precision
          requirements.</p><p>The business benefits are more regular quality,
          better readability, fewer late revisions and copy that is more
          consistent with the editorial line. The limits are explicit: AI does
          not always know the legal, political or sector context. Facts,
          figures, obligations and sensitive wording remain validated by a
          human.</p><p><strong><a href="/en/contact">Audit an AI review
          workflow</a></strong> or explore the <a href="/en/ai-drupal">AI
          &amp; Drupal</a> hub. This feature complements <a
          href="/en/ai-drupal/assisted-writing">assisted writing</a> and <a
          href="/en/ai-accessibility-seo-optimization">accessibility, SEO and
          optimization</a> services.</p>
        format: basic_html
      field_customer_benefit:
        value: >-
          More regular editorial quality, fewer late revisions and better
          readability for target audiences.
        format: basic_html
      field_concrete_example:
        value: >-
          A non-profit reviews a public support page: AI simplifies sentences,
          lists points to confirm and the team approves sensitive wording before
          publication.
        format: basic_html
      field_use_cases:
        - value: 'Identify long or ambiguous sentences.'
          format: basic_html
        - value: 'Harmonise tone across several Drupal pages.'
          format: basic_html
        - value: 'Prepare an accessibility and content review.'
          format: basic_html
