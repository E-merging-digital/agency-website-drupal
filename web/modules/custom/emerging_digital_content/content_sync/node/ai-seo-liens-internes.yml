translations:
  fr:
    title: 'Suggestions SEO et liens internes'
    alias: /ia-drupal/seo-liens-internes
    fields:
      field_short_description:
        value: >-
          Assistant IA pour proposer titres, descriptions, angles SEO et liens
          internes localisés dans les contenus Drupal.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Les suggestions SEO et liens internes aident chaque page Drupal à
          porter une intention claire : répondre à une recherche, orienter vers
          la bonne suite et renforcer le maillage sans créer de liens
          artificiels. L’assistant propose des titres, descriptions, angles
          éditoriaux et liens localisés, mais l’équipe garde la décision.</p>
          <p>Cas d’usage concret : une PME rédige une page service sur un audit
          Drupal. L’IA suggère une meta description, deux liens vers des pages
          services, un lien vers un cas client et un CTA contact, tous en
          version FR ou EN selon la langue de la page.</p><p><strong>Workflow IA
          crédible :</strong></p><ol><li>Le rédacteur indique la page, la langue
          et l’intention de recherche visée.</li><li>L’assistant analyse le
          contenu, propose une description courte et 2 à 4 liens internes
          préfixés.</li><li>L’équipe supprime les liens redondants, vérifie les
          URLs et ajuste les ancres.</li><li>Le Link Checker et la validation
          humaine confirment que le maillage reste utile.</li></ol><p>Pour une
          ASBL, ce flux rend les appels à l’action plus visibles sans forcer le
          parcours. Pour une institution, il aide à relier des pages
          d’information, services et formulaires tout en respectant la langue du
          visiteur.</p><p>Les bénéfices sont une meilleure découvrabilité, des
          CTA plus cohérents, moins d’oublis de maillage et des contenus mieux
          reliés à la stratégie SEO. Les limites sont assumées : l’IA peut
          proposer un lien tentant mais peu utile, ou une ancre trop
          optimisée. Les liens restent sélectionnés, vérifiés et validés par une
          personne.</p><p><strong><a href="/fr/contact">Améliorer le maillage
          interne de votre Drupal</a></strong> ou consulter le hub <a
          href="/fr/ia-drupal">IA &amp; Drupal</a>. Cette fonctionnalité
          complète les <a href="/fr/services">services Drupal</a>, la <a
          href="/fr/ia-drupal/redaction-assistee">rédaction assistée</a> et les
          <a href="/fr/ia-drupal/resumes-tags-structure">résumés, tags et
          structure</a>.</p>
        format: basic_html
      field_customer_benefit:
        value: >-
          Un maillage interne plus cohérent, des contenus mieux orientés SEO,
          des CTA plus visibles et moins d’oublis lors de la publication.
        format: basic_html
      field_concrete_example:
        value: >-
          Une PME prépare une page d’audit Drupal : l’assistant propose une
          meta description, deux liens services, un lien vers un cas client et
          un CTA contact, puis l’équipe vérifie chaque URL localisée.
        format: basic_html
      field_use_cases:
        - value: 'Proposer une meta description alignée avec le contenu.'
          format: basic_html
        - value: 'Suggérer 2 à 4 liens internes utiles et localisés.'
          format: basic_html
        - value: 'Repérer les liens redondants avant publication.'
          format: basic_html
  en:
    title: 'SEO suggestions and internal links'
    alias: /ai-drupal/seo-internal-links
    fields:
      field_short_description:
        value: >-
          AI assistant to suggest titles, descriptions, SEO angles and
          localised internal links in Drupal content.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>SEO suggestions and internal links help each Drupal page carry a
          clear intent: answer a search, guide visitors to the right next step
          and strengthen internal linking without creating artificial links.
          The assistant suggests titles, descriptions, editorial angles and
          localised links, but the team keeps the decision.</p><p>Concrete use
          case: an SME drafts a service page about a Drupal audit. AI suggests
          a meta description, two links to service pages, one link to a case
          study and one contact CTA, all in FR or EN according to the page
          language.</p><p><strong>Credible AI workflow:</strong></p><ol><li>The
          editor provides the page, language and target search intent.</li><li>The
          assistant analyses the content and suggests a short description plus
          2 to 4 prefixed internal links.</li><li>The team removes redundant
          links, checks URLs and adjusts anchor text.</li><li>Link Checker and
          human validation confirm that linking remains useful.</li></ol><p>For
          a non-profit, this flow makes calls to action more visible without
          forcing the journey. For an institution, it helps connect information
          pages, services and forms while respecting the visitor’s
          language.</p><p>The benefits are stronger discoverability, more
          coherent CTAs, fewer linking omissions and content that better
          supports the SEO strategy. The limits are explicit: AI may suggest a
          tempting but weak link, or anchor text that is over-optimised. Links
          remain selected, checked and approved by a person.</p><p><strong><a
          href="/en/contact">Improve internal linking in your Drupal
          site</a></strong> or visit the <a href="/en/ai-drupal">AI &amp;
          Drupal</a> hub. This feature complements <a href="/en/services">Drupal
          services</a>, <a href="/en/ai-drupal/assisted-writing">assisted
          writing</a> and <a href="/en/ai-drupal/summaries-tags-structure">summaries,
          tags and structure</a>.</p>
        format: basic_html
      field_customer_benefit:
        value: >-
          More coherent internal linking, more SEO-oriented content, more
          visible CTAs and fewer omissions during publication.
        format: basic_html
      field_concrete_example:
        value: >-
          An SME prepares a Drupal audit page: the assistant suggests a meta
          description, two service links, one case study link and a contact CTA,
          then the team checks every localised URL.
        format: basic_html
      field_use_cases:
        - value: 'Suggest a meta description aligned with the content.'
          format: basic_html
        - value: 'Suggest 2 to 4 useful, localised internal links.'
          format: basic_html
        - value: 'Identify redundant links before publication.'
          format: basic_html
