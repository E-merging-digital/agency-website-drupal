translations:
  fr:
    title: 'Préparation traduction FR/EN'
    alias: /ia-drupal/traduction-fr-en
    fields:
      field_short_description:
        value: >-
          Assistant IA pour préparer les variantes françaises et anglaises des
          contenus Drupal avant relecture humaine.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>La préparation traduction FR/EN accélère le travail bilingue sans
          transformer la traduction en publication automatique. Elle produit
          une pré-traduction, signale les zones sensibles et aide l’équipe à
          comparer le sens, le ton et les liens internes entre les versions
          française et anglaise.</p><p>Cas d’usage concret : une institution
          publie une page d’information en français et doit produire une version
          anglaise fiable. L’assistant prépare une première version, indique les
          termes administratifs à confirmer et propose des liens localisés vers
          les bonnes pages EN.</p><p><strong>Workflow IA crédible :</strong></p><ol><li>La
          version source est relue et marquée comme prête à traduire.</li><li>L’assistant
          génère une variante EN ou FR en conservant la structure Drupal.</li><li>Les
          écarts de sens, termes métier et CTA sont listés pour contrôle.</li><li>Une
          personne bilingue valide la version finale, les liens et les hreflang
          avant publication.</li></ol><p>Pour une PME, ce flux permet de publier
          plus régulièrement en deux langues. Pour une ASBL, il évite de perdre
          la nuance d’un message public. Pour une institution, il soutient la
          cohérence terminologique entre services.</p><p>Les bénéfices sont une
          traduction mieux préparée, moins d’oublis dans les CTA et un contrôle
          plus clair des divergences FR/EN. Les limites restent importantes :
          l’IA peut manquer une nuance juridique, une expression locale ou une
          terminologie officielle. La relecture humaine et la responsabilité
          éditoriale restent indispensables.</p><p><strong><a
          href="/fr/contact">Organiser un workflow de traduction Drupal</a></strong>
          ou consulter le hub <a href="/fr/ia-drupal">IA &amp; Drupal</a>. Cette
          fonctionnalité se combine avec les <a
          href="/fr/ia-drupal/resumes-tags-structure">résumés, tags et
          structure</a>, l’offre <a href="/fr/ia-integree">IA intégrée</a> et la <a
          href="/fr/ia-drupal/gouvernance-validation">gouvernance IA</a>.</p>
        format: basic_html
      field_customer_benefit:
        value: >-
          Des contenus bilingues préparés plus vite, avec moins d’écarts de
          sens, des CTA localisés et une relecture mieux organisée.
        format: basic_html
      field_concrete_example:
        value: >-
          Une institution prépare la version anglaise d’une page d’information :
          l’IA conserve la structure, signale les termes à vérifier et l’équipe
          bilingue valide les liens EN avant publication.
        format: basic_html
      field_use_cases:
        - value: 'Préparer une pré-traduction anglaise depuis une source française.'
          format: basic_html
        - value: 'Repérer les écarts de sens entre deux versions.'
          format: basic_html
        - value: 'Organiser une checklist de relecture humaine.'
          format: basic_html
  en:
    title: 'FR/EN translation preparation'
    alias: /ai-drupal/fr-en-translation
    fields:
      field_short_description:
        value: >-
          AI assistant to prepare French and English Drupal content variants
          before human review.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>FR/EN translation preparation speeds up bilingual work without
          turning translation into automatic publication. It produces a
          pre-translation, highlights sensitive areas and helps the team compare
          meaning, tone and internal links between the French and English
          versions.</p><p>Concrete use case: an institution publishes an
          information page in French and needs a reliable English version. The
          assistant prepares a first version, flags administrative terms to
          confirm and suggests localised links to the right EN pages.</p>
          <p><strong>Credible AI workflow:</strong></p><ol><li>The source
          version is reviewed and marked as ready to translate.</li><li>The
          assistant generates an EN or FR variant while preserving the Drupal
          structure.</li><li>Meaning gaps, business terms and CTAs are listed
          for control.</li><li>A bilingual reviewer approves the final version,
          links and hreflang before publication.</li></ol><p>For an SME, this
          flow helps publish more regularly in two languages. For a non-profit,
          it avoids losing nuance in public messaging. For an institution, it
          supports terminology consistency across departments.</p><p>The
          benefits are better prepared translation, fewer CTA omissions and
          clearer control over FR/EN divergences. The limits remain important:
          AI can miss a legal nuance, local expression or official terminology.
          Human review and editorial responsibility remain essential.</p>
          <p><strong><a href="/en/contact">Organise a Drupal translation
          workflow</a></strong> or visit the <a href="/en/ai-drupal">AI &amp;
          Drupal</a> hub. This feature combines well with <a
          href="/en/ai-drupal/summaries-tags-structure">summaries, tags and
          structure</a>, the <a href="/en/integrated-ai">integrated AI</a>
          service and <a href="/en/ai-drupal/governance-approval">AI governance</a>.</p>
        format: basic_html
      field_customer_benefit:
        value: >-
          Bilingual content prepared faster, with fewer meaning gaps, localised
          CTAs and a more organised review process.
        format: basic_html
      field_concrete_example:
        value: >-
          An institution prepares the English version of an information page:
          AI preserves the structure, flags terms to verify and the bilingual
          team approves EN links before publication.
        format: basic_html
      field_use_cases:
        - value: 'Prepare an English pre-translation from a French source.'
          format: basic_html
        - value: 'Identify meaning gaps between two versions.'
          format: basic_html
        - value: 'Organise a human review checklist.'
          format: basic_html
