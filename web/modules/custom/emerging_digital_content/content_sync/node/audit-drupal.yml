translations:
  fr:
    fields:
      field_short_description:
        value: >-
          Audit Drupal technique, SEO, performance, accessibilité et éditorial
          pour identifier les risques, prioriser les corrections et cadrer les
          prochaines évolutions.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital réalise des audits Drupal pour donner une vision
          claire de l'état d'un site existant, des risques à traiter et des
          décisions à prendre avant une refonte, une migration ou une phase de
          maintenance.</p><h2>Un audit Drupal actionnable</h2><ul><li>Audit
          technique : version Drupal, modules, configuration, sécurité,
          architecture et dette maintenable.</li><li>Audit SEO : structure des
          pages, titles, descriptions, canonicals, aliases, redirections et
          maillage interne.</li><li>Audit performance et accessibilité pour
          identifier les obstacles visibles par vos publics.</li><li>Audit
          éditorial : modèles de contenus, workflows, gouvernance et clarté des
          pages prioritaires.</li><li>Audit IA et LLM SEO pour repérer les
          usages utiles sans fragiliser la qualité éditoriale.</li></ul><p>Les
          conclusions peuvent alimenter une <a href="/fr/refonte-site-drupal">
          refonte Drupal</a>, une <a href="/fr/migration-drupal">migration
          Drupal</a>, une <a href="/fr/maintenance-drupal">maintenance
          Drupal</a> ou un cadrage plus large avec notre <a
          href="/fr/agence-drupal-belgique">agence Drupal en Belgique</a>. Elles
          peuvent aussi préparer nos <a href="/fr/services">services Drupal</a>
          et notre approche <a href="/fr/ia-drupal">IA &amp; Drupal</a>.</p>
          <p><strong>Vous voulez savoir où agir en premier ?</strong> <a
          href="/fr/contact">Demandez un audit Drupal</a> avec livrable clair,
          priorités et prochaines étapes.</p>
        format: basic_html
  en:
    fields:
      field_short_description:
        value: >-
          Technical, SEO, performance, accessibility and editorial Drupal audit
          to identify risks, prioritise fixes and frame the next improvements.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital runs Drupal audits to provide a clear view of an
          existing website, the risks to address and the decisions to make
          before a redesign, migration or maintenance phase.</p><h2>An
          actionable Drupal audit</h2><ul><li>Technical audit: Drupal version,
          modules, configuration, security, architecture and maintainable debt.
          </li><li>SEO audit: page structure, titles, descriptions, canonicals,
          aliases, redirects and internal linking.</li><li>Performance and
          accessibility audit to identify obstacles your audiences can feel.
          </li><li>Editorial audit: content models, workflows, governance and
          clarity of priority pages.</li><li>AI and LLM SEO audit to identify
          useful use cases without weakening editorial quality.</li></ul><p>The
          findings can feed a <a href="/en/drupal-website-redesign">Drupal
          redesign</a>, a <a href="/en/drupal-migration">Drupal migration</a>,
          <a href="/en/drupal-maintenance">Drupal maintenance</a> or broader
          framing with our <a href="/en/drupal-agency-belgium">Drupal agency in
          Belgium</a>. They can also prepare our <a href="/en/services">Drupal
          services</a> and <a href="/en/ai-drupal">AI &amp; Drupal</a>
          approach.</p><p><strong>Want to know where to act first?</strong>
          <a href="/en/contact">Request a Drupal audit</a> with a clear
          deliverable, priorities and next steps.</p>
        format: basic_html
