translations:
  fr:
    fields:
      field_short_description:
        value: >-
          Contactez E-merging Digital pour cadrer un projet Drupal, une refonte,
          un audit ou une évolution IA avec une réponse humaine et claire depuis
          la Belgique.
        format: basic_html
  en:
    fields:
      field_short_description:
        value: >-
          Contact E-merging Digital to frame a Drupal project, redesign, audit
          or AI evolution with a clear, human response from Belgium.
        format: basic_html
components:
  - id: contact.hero
    legacy_uuid: dc4e80eb-e338-4dfb-a7b3-ce0f4e1eba92
    bundle: hero
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Un projet Drupal à cadrer ? Parlons-en simplement'
          field_text:
            - value: >-
                Contactez E-merging Digital pour cadrer un projet Drupal, un
                audit, une refonte ou une évolution IA. Plus votre contexte est
                clair, plus notre réponse humaine peut être utile dès le premier
                échange.
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'A Drupal project to frame? Let’s make it clear'
          field_text:
            - value: >-
                Contact E-merging Digital to frame a Drupal project, audit,
                redesign, or AI evolution. The clearer your context, the more
                useful our human response can be from the first exchange.
              format: basic_html
  - id: contact.qualification_paths
    legacy_uuid: 1dd03c6b-d313-48af-9971-151a0b13d7f4
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Choisir un contexte de qualification'
          field_text:
            - value: >-
                <div id="qualification-contact" class="ed-contact-paths"><p>Choisissez
                le point de départ le plus proche de votre besoin. Le formulaire
                reprendra ce contexte et vous pourrez le compléter librement.</p>
                <ul><li><a class="button button--secondary"
                href="/fr/contact?type=audit&amp;source=contact&amp;context=Audit%20Drupal#contact-form">Demander
                un audit</a></li><li><a class="button button--secondary"
                href="/fr/contact?type=redesign&amp;source=contact&amp;context=Refonte%20Drupal#contact-form">Cadrer
                une refonte</a></li><li><a class="button button--secondary"
                href="/fr/contact?type=migration&amp;source=contact&amp;context=Migration%20Drupal#contact-form">Préparer
                une migration</a></li><li><a class="button button--secondary"
                href="/fr/contact?type=ai&amp;source=contact&amp;context=IA%20et%20Drupal#contact-form">Qualifier
                un besoin IA</a></li><li><a class="button button--secondary"
                href="/fr/contact?type=maintenance&amp;source=contact&amp;context=Maintenance%20Drupal#contact-form">Organiser
                la maintenance</a></li></ul></div>
              format: full_html
      en:
        fields:
          field_heading:
            - value: 'Choose a qualification context'
          field_text:
            - value: >-
                <div id="qualification-contact" class="ed-contact-paths"><p>Choose
                the starting point closest to your need. The form will reuse
                this context and you can adjust it freely.</p><ul><li><a
                class="button button--secondary"
                href="/en/contact?type=audit&amp;source=contact&amp;context=Drupal%20audit#contact-form">Request
                an audit</a></li><li><a class="button button--secondary"
                href="/en/contact?type=redesign&amp;source=contact&amp;context=Drupal%20redesign#contact-form">Frame
                a redesign</a></li><li><a class="button button--secondary"
                href="/en/contact?type=migration&amp;source=contact&amp;context=Drupal%20migration#contact-form">Prepare
                a migration</a></li><li><a class="button button--secondary"
                href="/en/contact?type=ai&amp;source=contact&amp;context=AI%20and%20Drupal#contact-form">Qualify
                an AI need</a></li><li><a class="button button--secondary"
                href="/en/contact?type=maintenance&amp;source=contact&amp;context=Drupal%20maintenance#contact-form">Organise
                maintenance</a></li></ul></div>
              format: full_html
  - id: contact.form
    legacy_uuid: 855b08da-0ec9-4261-883a-d27f214606e6
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Qualifier votre demande'
          field_text:
            - value: >-
                Vous pouvez indiquer le contexte du projet, le type de besoin
                (création, refonte, maintenance, audit, IA), l’URL du site
                existant, un budget indicatif optionnel, les délais souhaités
                et votre niveau de maturité. Ne transmettez pas de mots de
                passe, secrets, données sensibles, documents confidentiels ou
                données personnelles de tiers.
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Qualify your request'
          field_text:
            - value: >-
                You can share the project context, need type (build, redesign,
                maintenance, audit, AI), existing website URL, optional
                indicative budget, desired timeline and maturity level. Do not
                send passwords, secrets, sensitive data, confidential documents
                or third-party personal data.
              format: basic_html
  - id: contact.intro
    legacy_uuid: 88affed2-d7e1-44bc-8607-28f0111fc123
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Vous cherchez le bon point d’entrée ?'
          field_text:
            - value: >-
                <p>Pour préparer votre demande, vous pouvez aussi consulter nos
                <a href="/fr/services">services Drupal</a>, l’offre
                <a href="/fr/audit-drupal">audit Drupal</a>, les usages
                <a href="/fr/ia-drupal">IA &amp; Drupal</a> ou quelques
                <a href="/fr/cas-clients">cas clients</a>. Si vous hésitez,
                décrivez simplement le problème à résoudre et les contraintes à
                respecter.</p>
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Looking for the right entry point?'
          field_text:
            - value: >-
                <p>To prepare your request, you can also review our
                <a href="/en/services">Drupal services</a>,
                <a href="/en/drupal-audit">Drupal audit</a>,
                <a href="/en/ai-drupal">AI &amp; Drupal</a> use cases, or a
                few <a href="/en/case-studies">case studies</a>. If you are
                unsure, simply describe the problem to solve and the constraints
                to respect.</p>
              format: basic_html
  - id: contact.information
    legacy_uuid: 8236e39f-2bcf-4758-a441-c9f6eb8f75f6
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Un premier échange utile et sans engagement'
          field_text:
            - value: >-
                <p>Réponse humaine, généralement sous deux jours ouvrables.</p>
                <p>Accompagnement senior pour PME, ASBL et institutions en
                Belgique.</p>
                <p>Attention portée à l’accessibilité, au SEO, à la gouvernance
                éditoriale et à la maintenabilité Drupal.</p>
                <p>Pas de proposition automatique : nous qualifions d’abord le
                besoin réel.</p>
                <p>Pour un premier échange efficace, précisez ce qui existe
                déjà, ce qui doit changer, les publics concernés, l’urgence
                éventuelle et les décisions déjà prises.</p>
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'A useful first conversation, without commitment'
          field_text:
            - value: >-
                <p>Human response, usually within two business days.</p>
                <p>Senior support for SMEs, non-profits, and institutions in
                Belgium.</p>
                <p>Attention to accessibility, SEO, editorial governance, and
                Drupal maintainability.</p>
                <p>No automated proposal: we first qualify the real need.</p>
                <p>For an efficient first conversation, mention what already
                exists, what needs to change, the audiences involved, any
                urgency and decisions already made.</p>
              format: basic_html
