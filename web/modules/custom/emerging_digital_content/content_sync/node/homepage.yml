            - value: >-
                Création de site web professionnel|Un site clair, rapide et
                administrable, pensé pour vos publics, vos contenus et votre
                acquisition.|/fr/services
              format: basic_html
            - value: >-
                Refonte de site internet|Clarifier l’offre, préserver le SEO
                utile, améliorer les parcours et moderniser le socle
                technique.|/fr/refonte-site-drupal
              format: basic_html
            - value: >-
                Développement web sur mesure|Fonctionnalités métier,
