components:
  - id: homepage.hero
    legacy_uuid: 3b376be4-852e-4fa2-85ba-a64ff0fefa9d
    bundle: hero
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Drupal pour projets structurés, accessibles et évolutifs'
          field_text:
            - value: >-
                Nous accompagnons PME, ASBL et organisations publiques dans des
                projets Drupal robustes, avec une architecture éditoriale
                claire, des exigences d’accessibilité web et une IA utile au
                quotidien.
              format: basic_html
          field_link:
            - uri: 'internal:/fr/contact'
              title: 'Demander un audit'
          field_secondary_link:
            - uri: 'internal:/fr/services'
              title: 'Explorer les services Drupal'
      en:
        fields:
          field_heading:
            - value: 'Drupal for structured, accessible, and scalable projects'
          field_text:
            - value: >-
                We support SMEs, non-profits, and public organizations in
                robust Drupal projects, with a clear editorial architecture,
                web accessibility requirements, and useful AI for everyday use.
              format: basic_html
          field_link:
            - uri: 'internal:/en/contact'
              title: 'Request an audit'
          field_secondary_link:
            - uri: 'internal:/en/services'
              title: 'Explore Drupal services'
  - id: homepage.positioning
    legacy_uuid: ad8e2138-9355-4951-90dc-354e07847eca
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Positionnement éditorial clair pour environnements exigeants'
          field_text:
            - value: >-
                Notre approche Drupal s’adresse aux contextes structurés et
                institutionnels : gouvernance de contenu, parcours d’édition
                fiables, accessibilité web et intégration d’outils IA pour la
                rédaction assistée, le SEO éditorial et l’ouverture vers la
                traduction automatique.
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Clear editorial positioning for demanding environments'
          field_text:
            - value: >-
                Our Drupal approach is aimed at structured and institutional
                contexts: content governance, reliable editing workflows, web
                accessibility, and integration of AI tools for assisted
                writing, editorial SEO, and openness to machine translation.
              format: basic_html
  - id: homepage.services
    legacy_uuid: efdbbfe1-aec4-4cbb-be3d-33f3fe5966ac
