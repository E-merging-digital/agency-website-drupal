components:
  - id: homepage.hero
    legacy_uuid: 3b376be4-852e-4fa2-85ba-a64ff0fefa9d
    bundle: hero
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Agence web senior pour sites professionnels, IA et PHP durable'
          field_text:
            - value: >-
                Nous aidons les PME, ASBL et organisations publiques à créer,
                refondre et moderniser des sites web fiables : architecture PHP
                robuste, IA utile, SEO technique, accessibilité et performance
                dès la conception.
              format: basic_html
          field_link:
            - uri: 'internal:/fr/contact'
              title: 'Qualifier mon projet'
          field_secondary_link:
            - uri: 'internal:/fr/services'
              title: 'Voir les expertises'
      en:
        fields:
          field_heading:
            - value: 'Senior web agency for professional websites, AI and durable PHP'
          field_text:
            - value: >-
                We help SMEs, non-profits and public organizations build,
                redesign and modernize reliable websites: robust PHP
                architecture, useful AI, technical SEO, accessibility and
                performance from the start.
              format: basic_html
          field_link:
            - uri: 'internal:/en/contact'
              title: 'Qualify my project'
          field_secondary_link:
            - uri: 'internal:/en/services'
              title: 'See our expertise'
  - id: homepage.positioning
    legacy_uuid: ad8e2138-9355-4951-90dc-354e07847eca
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Business, IA et expertise technique dans un même cadre'
          field_text:
            - value: >-
                Emerging Digital accompagne les organisations qui veulent un
                site clair pour leurs publics, solide pour leurs équipes et
                prêt à évoluer. Nous partons des enjeux métier, qualifions les
                priorités, cadrons les bons usages IA et construisons sur un
                socle PHP moderne : Drupal, Symfony ou Laravel selon le
                contexte.
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Business, AI and technical expertise in one framework'
          field_text:
            - value: >-
                Emerging Digital supports organizations that need a website
                clear for their audiences, solid for their teams and ready to
                evolve. We start from business needs, qualify priorities,
                frame the right AI uses and build on a modern PHP foundation:
                Drupal, Symfony or Laravel depending on the context.
              format: basic_html
  - id: homepage.services
    legacy_uuid: efdbbfe1-aec4-4cbb-be3d-33f3fe5966ac
    bundle: services
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Business : créer, refondre et faire évoluer votre site'
