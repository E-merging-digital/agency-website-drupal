  - id: homepage.cta
    legacy_uuid: 88bc3809-2c51-4ec1-93a8-2eed9ce6930c
    bundle: cta
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Prêt à qualifier votre projet ?'
          field_text:
            - value: >-
                Préparez le contexte, le type de besoin, l’état de votre site
                existant, l’horizon souhaité et les contraintes principales.
                Nous pourrons ensuite cadrer une création, une refonte, un
                audit, une modernisation PHP ou un premier workflow IA. Merci
                de ne pas transmettre de mots de passe, secrets, données
                sensibles ou documents confidentiels via le formulaire. Vous
                pouvez aussi consulter nos <a href="/fr/services">services</a>
                et notre approche <a href="/fr/ia-drupal">IA &amp; Drupal</a>.
              format: basic_html
          field_link:
            - uri: 'internal:/fr/contact'
              title: 'Qualifier mon projet'
      en:
        fields:
          field_heading:
            - value: 'Ready to qualify your project?'
          field_text:
            - value: >-
                Prepare the context, need type, existing website status,
                desired timeline and main constraints. We can then scope a
                website build, redesign, audit, PHP modernization or first AI
                workflow. Please do not send passwords, secrets, sensitive data
                or confidential documents through the form. You can also
                explore our <a href="/en/services">services</a> and our <a
                href="/en/ai-drupal">AI &amp; Drupal</a> approach.
              format: basic_html
          field_link:
            - uri: 'internal:/en/contact'
              title: 'Qualify my project'
