              format: basic_html
            - value: >-
                SEO technique, performance et accessibilité|Un socle lisible
                par les visiteurs, les moteurs de recherche et les équipes qui
                le maintiennent.|/fr/accessibilite-seo-optimisation
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Business: build, redesign and evolve your website'
          field_items:
            - value: >-
                Professional website creation|A clear, fast and manageable
                website designed for your audiences, your content and your
                acquisition.|/en/services
              format: basic_html
            - value: >-
                Website redesign|Clarify the offer, protect useful SEO,
                improve journeys and modernize the technical
                foundation.|/en/drupal-website-redesign
              format: basic_html
            - value: >-
                Custom web development|Business features, integrations,
                workflows and durable PHP architecture without stacking fragile
                solutions.|/en/services
              format: basic_html
            - value: >-
                Maintenance and long-term support|Security, updates, support,
                continuous improvement and technical decisions with a senior
                partner.|/en/drupal-maintenance
              format: basic_html
            - value: >-
                Audit and modernization of existing sites|Taking over Drupal,
                WordPress or custom builds to secure, optimize or migrate
                toward a more durable architecture.|/en/drupal-audit
              format: basic_html
            - value: >-
                Technical SEO, performance and accessibility|A foundation that
                is readable for visitors, search engines and the teams who
                maintain it.|/en/ai-accessibility-seo-optimization
              format: basic_html
  - id: homepage.ai-features
    legacy_uuid: b73c293b-32b3-426d-a86b-adfed1a386a7
    bundle: ai_features
    translations:
      fr:
        fields:
          field_heading:
            - value: 'IA : automatiser sans perdre la maîtrise'
          field_text:
            - value: >-
                L’IA doit servir les équipes, pas remplacer leur jugement. Nous
                cadrons des automatisations utiles pour les PME et ASBL :
                contenus, documents, support, traduction, SEO et workflows, avec
                validation humaine et limites explicites. Explorez notre hub <a
                href="/fr/ia-drupal">IA &amp; Drupal</a> ou demandez un cadrage
                via <a href="/fr/contact">la page contact</a>.
              format: basic_html
          field_items:
            - value: >-
                IA pour PME et ASBL|Identifier les cas d’usage réellement
                utiles avant de brancher des outils dans vos processus.|/fr/ia-integree
              format: basic_html
            - value: >-
                Automatisation IA|Transformer des tâches répétitives en
                workflows relisibles, testables et gouvernables.|/fr/ia-drupal/gouvernance-validation
              format: basic_html
            - value: >-
                Chatbot IA et support documentaire|Répondre à partir de vos
                contenus maîtrisés, avec périmètre clair et escalade
                humaine.|/fr/ia-drupal
              format: basic_html
            - value: >-
                IA documentaire|Structurer, résumer, classer et réutiliser des
                contenus longs sans perdre la traçabilité.|/fr/ia-drupal/resumes-tags-structure
              format: basic_html
            - value: >-
                Rédaction, relecture et traduction|Préparer des variantes
                FR/EN, améliorer la clarté et garder les CTA
                localisés.|/fr/ia-drupal/traduction-fr-en
              format: basic_html
            - value: >-
                SEO et maillage interne assistés|Suggérer des angles, résumés
                et liens internes sans publier automatiquement.|/fr/ia-drupal/seo-liens-internes
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'AI: automate without losing control'
          field_text:
            - value: >-
                AI should serve teams, not replace their judgement. We frame
                useful automations for SMEs and non-profits: content,
                documents, support, translation, SEO and workflows, with human
                approval and explicit limits. Explore our <a
                href="/en/ai-drupal">AI &amp; Drupal</a> hub or request scoping
                through the <a href="/en/contact">contact page</a>.
              format: basic_html
          field_items:
            - value: >-
                AI for SMEs and non-profits|Identify genuinely useful use cases
                before connecting tools to your processes.|/en/integrated-ai
              format: basic_html
            - value: >-
                AI automation|Turn repetitive tasks into workflows that remain
                readable, testable and governable.|/en/ai-drupal/governance-approval
              format: basic_html
            - value: >-
                AI chatbot and document support|Answer from controlled content,
                with a clear scope and human escalation.|/en/ai-drupal
              format: basic_html
            - value: >-
                Document AI|Structure, summarize, classify and reuse long
                content without losing traceability.|/en/ai-drupal/summaries-tags-structure
              format: basic_html
            - value: >-
                Writing, review and translation|Prepare FR/EN variants, improve
                clarity and keep CTAs localized.|/en/ai-drupal/fr-en-translation
              format: basic_html
            - value: >-
                Assisted SEO and internal linking|Suggest angles, summaries and
                internal links without automatic publication.|/en/ai-drupal/seo-internal-links
              format: basic_html
