              format: basic_html
            - value: >-
                Migration et modernisation|Reprise de sites existants, montée
                de version Drupal, amélioration de la structure et des
                performances.|/fr/migration-drupal
              format: basic_html
            - value: >-
                Accessibilité, SEO et performance|Contenus lisibles, parcours
                clairs et socle technique optimisé pour vos publics et les
                moteurs de recherche.
              format: basic_html
            - value: >-
                IA intégrée dans le CMS|Aide à la rédaction, amélioration de la
                qualité éditoriale, enrichissement et préparation à la
                traduction automatique des contenus.
              format: basic_html
            - value: >-
                Agence Drupal Belgique|Un partenaire Drupal senior en Belgique
                pour structurer vos contenus, vos parcours et votre socle
                technique.|/fr/agence-drupal-belgique
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Our services'
          field_items:
            - value: >-
                Drupal Website Creation|A Drupal website designed for your
                content, your teams and your organic search
                visibility.|/en/drupal-website-creation
              format: basic_html
            - value: >-
                Drupal Maintenance|Regular technical support to secure and
                evolve your Drupal website.|/en/drupal-maintenance
              format: basic_html
            - value: >-
                Migration and modernization | Resumption of existing sites,
                Drupal version upgrade, improvement of structure and
                performance.|/en/drupal-migration
              format: basic_html
            - value: >-
                Accessibility, SEO, and performance | Readable content, clear
                pathways, and a technical foundation optimized for your
                audiences and search engines.
              format: basic_html
            - value: >-
                AI integrated into the CMS | Writing assistance, improvement of
                editorial quality, enrichment and preparation for automatic
                translation of content.
              format: basic_html
            - value: >-
                Drupal Agency Belgium|A senior Drupal partner in Belgium to
                structure your content, user journeys and technical
                foundation.|/en/drupal-agency-belgium
              format: basic_html
  - id: homepage.ai-features
    legacy_uuid: b73c293b-32b3-426d-a86b-adfed1a386a7
    bundle: ai_features
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Ce que l’IA peut faire dans Drupal'
          field_text:
            - value: >-
                Des usages IA concrets, intégrés à Drupal, pour aider les PME,
                ASBL et institutions à produire des brouillons, relire,
                traduire, structurer et relier leurs contenus sans sortir du
                cadre éditorial. Explorez le hub <a href="/fr/ia-drupal">IA
                &amp; Drupal</a> ou demandez un cadrage via <a
                href="/fr/contact">la page contact</a>.
              format: basic_html
          field_items:
            - value: >-
                Rédaction assistée|Transformer des notes métier en brouillons
                Drupal structurés, avec validation humaine avant
                publication.|/fr/ia-drupal/redaction-assistee
              format: basic_html
            - value: >-
                Correction éditoriale|Repérer les phrases confuses, harmoniser
                le ton et préparer une relecture plus efficace.|/fr/ia-drupal/correction-editoriale
              format: basic_html
            - value: >-
                Traduction FR/EN|Préparer les variantes bilingues, vérifier les
                écarts de sens et garder des CTA localisés.|/fr/ia-drupal/traduction-fr-en
              format: basic_html
            - value: >-
                Résumés, tags et structure|Synthétiser les pages longues,
                proposer des tags et rendre les contenus plus
                réutilisables.|/fr/ia-drupal/resumes-tags-structure
              format: basic_html
            - value: >-
                SEO et liens internes|Suggérer des descriptions, angles SEO et
                liens internes préfixés par langue.|/fr/ia-drupal/seo-liens-internes
              format: basic_html
            - value: >-
                Gouvernance IA|Documenter les prompts, les rôles de validation
                et les limites pour éviter toute publication non
                maîtrisée.|/fr/ia-drupal/gouvernance-validation
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'What AI can do in Drupal'
          field_text:
            - value: >-
                Concrete AI applications, integrated into Drupal, to help SMEs,
                non-profits and institutions draft, review, translate,
                structure and connect their content without leaving the
                editorial framework. Explore the <a href="/en/ai-drupal">AI
                &amp; Drupal</a> hub or request scoping through the <a
                href="/en/contact">contact page</a>.
              format: basic_html
          field_items:
            - value: >-
                Assisted writing|Turn business notes into structured Drupal
                drafts, with human approval before publication.|/en/ai-drupal/assisted-writing
              format: basic_html
            - value: >-
                Editorial review|Identify unclear wording, harmonise tone and
                prepare a more efficient review.|/en/ai-drupal/editorial-review
              format: basic_html
            - value: >-
                FR/EN translation|Prepare bilingual variants, check meaning
                gaps and keep CTAs localised.|/en/ai-drupal/fr-en-translation
              format: basic_html
            - value: >-
                Summaries, tags and structure|Summarise long pages, suggest
                tags and make content easier to reuse.|/en/ai-drupal/summaries-tags-structure
              format: basic_html
            - value: >-
                SEO and internal links|Suggest descriptions, SEO angles and
                language-prefixed internal links.|/en/ai-drupal/seo-internal-links
              format: basic_html
            - value: >-
                AI governance|Document prompts, approval roles and limits to
                avoid unmanaged publication.|/en/ai-drupal/governance-approval
              format: basic_html
