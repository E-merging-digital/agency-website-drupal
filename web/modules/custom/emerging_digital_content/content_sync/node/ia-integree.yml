translations:
  fr:
    fields:
      field_short_description:
        value: >-
          IA intégrée dans Drupal pour aider les équipes éditoriales :
          cas d’usage concrets pour PME, ASBL et institutions, assistance à la
          rédaction, qualité des contenus, traduction FR/EN et gouvernance des
          usages.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital intègre des usages IA directement dans Drupal
          pour soutenir les équipes éditoriales sans transformer le CMS en
          boite noire.</p><h2>Une IA Drupal utile et gouvernable</h2><ul><li>
          PME : brouillons de pages services, reformulation et amélioration du
          ton pour publier plus régulièrement.</li><li>ASBL : simplification de
          contenus, adaptation aux publics et meilleure accessibilité
          éditoriale.</li><li>Institutions : cohérence des pages
          d'information, notices, actualités et contenus multilingues.</li><li>
          Traduction FR/EN : préparation des variantes linguistiques, détection
          des écarts de sens et relecture humaine.</li><li>SEO et gouvernance :
          titres, résumés, tags, liens internes localisés, prompts documentés
          et validations internes.</li></ul><p>Cette offre prolonge notre approche <a
          href="/fr/ia-drupal">IA &amp; Drupal</a> et se relie à nos services
          d'<a href="/fr/accessibilite-seo-optimisation">accessibilité, SEO et
          optimisation</a>, de <a href="/fr/creation-site-drupal">création de
          site Drupal</a> et de <a href="/fr/maintenance-drupal">maintenance
          Drupal</a> dans le cadre de nos <a href="/fr/services">services
          Drupal</a>.</p><p>Elle peut aussi être cadrée après un <a
          href="/fr/audit-drupal">audit Drupal</a> afin de choisir les usages
          IA qui apportent une valeur réelle aux équipes. Voir le cas <a
          href="/fr/cas-clients/integration-ia-editoriale">intégration IA
          éditoriale</a>.</p><p><strong>Vous
          voulez intégrer l'IA sans perdre la qualité éditoriale ?</strong> <a
          href="/fr/contact">Contactez-nous</a> pour cadrer un premier usage
          concret dans Drupal.</p>
        format: basic_html
  en:
    fields:
      field_short_description:
        value: >-
          Integrated AI in Drupal for editorial teams: writing assistance,
          concrete use cases for SMEs, non-profits and institutions, content
          quality, FR/EN translation and governed usage.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital integrates AI use cases directly in Drupal to
          support editorial teams without turning the CMS into a black box.</p>
          <h2>Useful and governed Drupal AI</h2><ul><li>SMEs: service page
          drafts, rephrasing and tone improvements to publish more regularly.
          </li><li>Non-profits: content simplification, audience adaptation and
          better editorial accessibility.</li><li>Institutions: consistency
          across information pages, notices, news and multilingual content.
          </li><li>FR/EN translation: preparation of language variants, meaning
          gap detection and human review.</li><li>SEO and governance: titles,
          summaries, tags, localised internal links, documented prompts and
          internal approvals.</li>
          </ul><p>This service extends our <a href="/en/ai-drupal">AI &amp;
          Drupal</a> approach and connects with <a
          href="/en/ai-accessibility-seo-optimization">accessibility, SEO and
          optimization</a>, <a href="/en/drupal-website-creation">Drupal website
          creation</a> and <a href="/en/drupal-maintenance">Drupal
          maintenance</a> within our broader <a href="/en/services">Drupal
          services</a>.</p><p>It can also be framed after a <a
          href="/en/drupal-audit">Drupal audit</a> to choose the AI use cases
          that create real value for teams. See the <a
          href="/en/case-studies/editorial-ai-integration">editorial AI
          integration</a> case study.</p><p><strong>Want to integrate AI
          without losing editorial quality?</strong> <a href="/en/contact">
          Contact us</a> to frame a first concrete use case in Drupal.</p>
        format: basic_html
