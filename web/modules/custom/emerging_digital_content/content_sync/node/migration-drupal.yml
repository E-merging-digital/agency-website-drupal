translations:
  fr:
    fields:
      field_short_description:
        value: >-
          Migration Drupal vers Drupal 11 pour sites existants : audit
          technique, reprise de contenu, sécurisation, tests et mise en
          production maîtrisée.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital accompagne les organisations qui doivent migrer un
          site Drupal vieillissant sans perdre leurs contenus, leur
          référencement naturel ni la stabilité de leur plateforme.</p><h2>Une
          migration Drupal préparée et contrôlée</h2><ul><li>Audit de la
          version actuelle, des modules, du thème, des intégrations et de la
          dette technique.</li><li>Stratégie de migration pour les contenus, la
          configuration, les médias, les utilisateurs et les traductions.</li>
          <li>Modernisation du socle vers Drupal 11 avec priorisation des
          risques de sécurité et de maintenance.</li><li>Tests fonctionnels,
          vérifications SEO, redirections et contrôle des aliases
          multilingues.</li><li>Mise en production progressive et maintenance
          post-migration pour stabiliser la plateforme.</li></ul><p>Cette page
          complète notre approche d'<a href="/fr/agence-drupal-belgique">agence
          Drupal en Belgique</a>. Elle s'articule avec nos <a
          href="/fr/services">services Drupal</a>, notre approche <a
          href="/fr/ia-drupal">IA &amp; Drupal</a> et nos offres de <a
          href="/fr/audit-drupal">audit Drupal</a>, de <a
          href="/fr/refonte-site-drupal">refonte de site Drupal</a> et de <a
          href="/fr/maintenance-drupal">maintenance Drupal</a>.</p><p><strong>
          Besoin de migrer sans improviser ?</strong> <a href="/fr/contact">
          Parlons de votre contexte Drupal</a> et des risques à lever avant la
          mise en production.</p>
        format: basic_html
  en:
    fields:
      field_short_description:
        value: >-
          Drupal migration to Drupal 11 for existing websites: technical audit,
          content migration, security hardening, testing and controlled
          production release.
        format: basic_html
      field_detailed_description:
        value: >-
          <p>Emerging Digital supports organisations that need to migrate an
          ageing Drupal website without losing content, organic search
          visibility or platform stability.</p><h2>A prepared and controlled
          Drupal migration</h2><ul><li>Audit of the current version, modules,
          theme, integrations and technical debt.</li><li>Migration strategy
          for content, configuration, media, users and translations.</li><li>
          Foundation upgrade to Drupal 11 with security and maintenance risks
          prioritised.</li><li>Functional testing, SEO checks, redirects and
          multilingual alias control.</li><li>Progressive production release
          and post-migration maintenance to stabilise the platform.</li></ul>
          <p>This page complements our <a href="/en/drupal-agency-belgium">
          Drupal agency in Belgium</a> approach. It connects with our <a
          href="/en/services">Drupal services</a>, our <a href="/en/ai-drupal">
          AI &amp; Drupal</a> approach, our <a href="/en/drupal-audit">Drupal
          audit</a>, <a
          href="/en/drupal-website-redesign">Drupal website redesign</a> and <a
          href="/en/drupal-maintenance">Drupal maintenance</a> services.</p>
          <p><strong>Need to migrate without improvising?</strong> <a
          href="/en/contact">Let's discuss your Drupal context</a> and the
          risks to resolve before release.</p>
        format: basic_html
