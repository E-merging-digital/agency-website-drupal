  - id: services.why-drupal
    legacy_uuid: 2f4f723a-90d5-4a95-84dc-333363d51655
    bundle: text_block
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Pourquoi Drupal pour des projets exigeants'
          field_text:
            - value: >-
                Drupal reste mis en avant parce qu’il répond aux projets qui
                doivent durer : contenus nombreux, multilingue, rôles
                éditoriaux, sécurité, accessibilité, maintenance et évolutions
                maîtrisées. Les parcours business et IA complètent ce socle ;
                ils ne le remplacent pas.
              format: basic_html
      en:
        fields:
          field_heading:
            - value: 'Why choose Drupal for demanding projects'
          field_text:
            - value: >-
                Drupal remains visible because it fits projects that must last:
                rich content, multilingual publishing, editorial roles,
                security, accessibility, maintenance and controlled evolution.
                Business and AI paths complement this foundation; they do not
                replace it.
              format: basic_html
  - id: services.cta
    legacy_uuid: cfe7d994-e099-44b4-a0cc-12c69760288e
    bundle: cta
    translations:
      fr:
        fields:
          field_text:
            - value: >-
                Vous préparez une création, une refonte ou une évolution Drupal
                avec des enjeux de contenu, de SEO ou d’IA ? Nous pouvons
                clarifier le besoin, prioriser les risques et proposer un
                chemin réaliste, durable et maintenable. Pour gagner du temps,
                indiquez le contexte, le type de besoin, l’état de l’existant,
                le délai souhaité et le niveau de maturité. Ne transmettez pas
                de données sensibles, secrets ou accès techniques via le
                formulaire.
              format: basic_html
          field_link:
            - uri: 'internal:/fr/contact'
              title: 'Qualifier mon projet'
      en:
        fields:
          field_text:
            - value: >-
                Planning a build, redesign or Drupal evolution with content,
                SEO or AI constraints? We can clarify the need, prioritize
                risks and propose a realistic, durable and maintainable path.
                To save time, include the context, need type, current state,
                desired timeline and maturity level. Do not send sensitive
                data, secrets or technical access through the form.
              format: basic_html
          field_link:
            - uri: 'internal:/en/contact'
              title: 'Qualify my project'
