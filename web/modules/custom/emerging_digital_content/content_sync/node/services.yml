components:
  - id: services.hero
    legacy_uuid: 50c9c0ef-85f8-49a3-819c-4aa63ddd1737
    bundle: hero
    translations:
      fr:
        fields:
          field_heading:
            - value: 'Services web senior, avec Drupal comme socle premium'
          field_text:
            - value: >-
                Nous aidons PME, ASBL et organisations publiques à créer,
                moderniser et faire évoluer des plateformes web durables :
                Drupal pour les projets structurés, parcours business lisibles
                et IA utile avec validation humaine.
              format: basic_html
          field_link:
            - uri: 'internal:/fr/contact'
              title: 'Qualifier mon projet'
          field_secondary_link:
            - uri: 'internal:/fr/cas-clients'
              title: 'Voir des cas similaires'
      en:
        fields:
          field_heading:
            - value: 'Senior web services, with Drupal as the premium foundation'
          field_text:
            - value: >-
                We help SMEs, non-profits and public organizations build,
                modernize and evolve durable web platforms: Drupal for
                structured projects, clear business journeys and useful AI with
                human validation.
              format: basic_html
          field_link:
            - uri: 'internal:/en/contact'
              title: 'Qualify my project'
          field_secondary_link:
            - uri: 'internal:/en/case-studies'
              title: 'See similar cases'
  - id: services.intro
    legacy_uuid: 2eb8e4b6-37d0-47cc-8702-7a850dd94c15
    bundle: text_block
    translations:
      fr:
        fields:
          field_text:
            - value: >-
                La page Services n’est pas un catalogue : elle sert à choisir
                le bon parcours. Commencez par le besoin métier, vérifiez le
                niveau d’exigence technique, puis cadrez l’IA uniquement quand
                elle apporte une valeur mesurable. Si le périmètre reste flou,
                préparez d’abord votre contexte, vos contraintes, votre horizon
                et votre niveau de maturité avant de nous contacter.
              format: basic_html
      en:
        fields:
          field_text:
            - value: >-
                The Services page is not a catalogue: it helps choose the right
                path. Start with the business need, check the technical level
                required, then frame AI only when it creates measurable value.
                If the scope is still unclear, first prepare your context,
                constraints, timeline and maturity level before contacting us.
              format: basic_html
